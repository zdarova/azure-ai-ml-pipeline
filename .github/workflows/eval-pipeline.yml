name: RAG Evaluation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  submit-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install azure-ai-ml azure-identity

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ML_SUBSCRIPTION_ID }}

      - name: Submit Azure ML Pipeline
        env:
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_KEY: ${{ secrets.AZURE_AI_KEY }}
          AZURE_AI_CHAT_DEPLOYMENT: claude-sonnet-4-6
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
          PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}
        run: |
          python pipeline.py \
            --subscription-id "${{ secrets.AZURE_ML_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.AZURE_ML_RESOURCE_GROUP }}" \
            --workspace "${{ secrets.AZURE_ML_WORKSPACE }}" \
            --compute cpu-cluster \
            --threshold 0.6 \
            --experiment-name ricoh-rag-evaluation
