name: RAG Evaluation Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  AZURE_ML_SUBSCRIPTION_ID: ${{ secrets.AZURE_ML_SUBSCRIPTION_ID }}
  AZURE_ML_RESOURCE_GROUP: ${{ secrets.AZURE_ML_RESOURCE_GROUP }}
  AZURE_ML_WORKSPACE: ${{ secrets.AZURE_ML_WORKSPACE }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  submit-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install azure-ai-ml azure-identity

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_ML_SUBSCRIPTION_ID }}

      - name: Submit Azure ML Pipeline
        run: |
          python pipeline.py \
            --subscription-id "$AZURE_ML_SUBSCRIPTION_ID" \
            --resource-group "$AZURE_ML_RESOURCE_GROUP" \
            --workspace "$AZURE_ML_WORKSPACE" \
            --compute cpu-cluster \
            --threshold 0.6 \
            --experiment-name ricoh-rag-evaluation
