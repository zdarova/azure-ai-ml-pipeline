name: RAG Evaluation Pipeline

on:
  # Triggered by data repo or agent repo changes
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am

env:
  AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
  AZURE_AI_KEY: ${{ secrets.AZURE_AI_KEY }}
  AZURE_AI_CHAT_DEPLOYMENT: claude-sonnet-4-6
  AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
  AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
  PG_CONNECTION_STRING: ${{ secrets.PG_CONNECTION_STRING }}

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run RAG evaluation
        run: python eval/rag_evaluation.py
      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-metrics
          path: mlruns/

  gate:
    needs: evaluate
    runs-on: ubuntu-latest
    steps:
      - name: Quality gate check
        run: |
          if [ "${{ needs.evaluate.result }}" = "failure" ]; then
            echo "❌ Quality gate FAILED - blocking deployment"
            exit 1
          fi
          echo "✅ Quality gate PASSED"
